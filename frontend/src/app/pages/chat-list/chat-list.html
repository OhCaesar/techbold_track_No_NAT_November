<div class="chat-list">
  <div class="chat-item" *ngFor="let item of items">
    <div class="chat-item__left">
      <span class="chat-item__company">{{ item.company }}</span>
      <span class="chat-item__title">{{ item.title }}</span>
    </div>

    <div class="chat-item__priority">
      <span class="chat-item__label">Priority</span>
      <span class="chat-item__priority-value" [class]="'priority-' + item.priority.toLowerCase()">{{ item.priority }}</span>
    </div>

    <div class="chat-item__due-date">
      <span class="chat-item__label">Due Date</span>
      <span class="chat-item__due-date-value">{{ item.dueDate }}</span>
    </div>

    <div class="chat-item__tags">
      <span class="chat-item__label">Tags</span>
      <div class="chat-item__tags-list">
        <span class="chat-item__tag" *ngFor="let tag of item.tags">{{ tag }}</span>
      </div>
    </div>

    <div class="chat-item__count">
      <span class="chat-item__count-value">{{ item.count }}</span>
    </div>
  </div>
</div>
