          />
        </svg>
        <p class="empty-state__title">Welcome to <br>{{ ticketTitle }}</p>
        <p class="empty-state__subtitle">Create a chat to get STARTED!</p>
      </div>
    </div>
  } @else {
    <div class="chat-list-selector">
      @for (chat of availableChats; track chat.id) {
        <div class="chat-list-item-wrapper" (click)="selectChat(chat)">
          <app-chat-list-element
            [chatName]="chat.name"
            [chatDate]="chat.date"
            [active]="chat.active"
            [state]="chat.state"
          >
          </app-chat-list-element>
        </div>
      }
    </div>
  }
  <button class="create-chat-button" (click)="onCreateChatClick()">
    <span class="plus-icon">+</span>
    Create New Chat
  </button>
</div>
