<div class="container">
  <p class="name">{{ this.chatName }}</p>
  <p class="date">{{ this.chatDate }}</p>
  @if (isRunning) {
    <div class="status-indicator running">
      <span class="status-dot"></span>
      <p class="status-text">Running</p>
    </div>
  } @else if (isWaiting) {
    <div class="status-indicator waiting">
      <span class="status-dot"></span>
      <p class="status-text">Waiting on Approval</p>
    </div>
  } @else if (isStopped) {
    <div class="status-indicator stopped">
      <span class="status-icon">🛑</span>
      <p class="status-text">Stopped</p>
    </div>
  }
</div>
