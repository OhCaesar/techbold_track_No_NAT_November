<div class="container">
  <p class="name">{{ this.chatName }}</p>
  <p class="date">{{ this.chatDate }}</p>
  @if (isRunning) {
    <div class="status-indicator running">
      <span class="status-dot"></span>
      <p class="status-text">Running</p>
    </div>
  } @else if (isWaiting) {
    <div class="status-indicator waiting">
      <span class="status-dot"></span>
      <p class="status-text">Waiting for input</p>
    </div>
  } @else if (isCompleted) {
    <div class="status-indicator completed">
      <span class="status-icon">✓</span>
      <p class="status-text">Completed</p>
    </div>
  } @else if (isFailed) {
    <div class="status-indicator failed">
      <span class="status-icon">✕</span>
      <p class="status-text">Failed</p>
    </div>
  } @else if (active) {
    <div class="active-indicator">
      <span class="active-dot"></span>
      <p class="active">Active</p>
    </div>
  }
</div>
