<div class="log-container">
  <h2 class="log-title">Logs</h2>

  <div class="log-search">
    <input
      class="log-search__input"
      type="search"
      placeholder="Search logs…"
      [(ngModel)]="searchQuery"
    />
  </div>

  <div class="logs-list">
    @for (log of filteredLogs; track $index) {
      <div class="log-entry">
        <div class="log-header">
          <div class="log-meta">
            <p class="log-datetime">{{ log.datetime }}</p>
            <span class="status-badge" [ngClass]="getStatusClass(log)">
              {{ getStatusLabel(log) }}
            </span>
          </div>
          <p class="log-chat-message">{{ log.chatMessage }}</p>
        </div>

        <div class="log-content">
          <code>{{ log.content }}</code>
        </div>
      </div>
    }
  </div>
</div>
